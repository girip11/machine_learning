default_language_version:
  # force all unspecified python hooks to run python3
  python: python3
repos:
  - repo: local
    hooks:
      - id: nbqa-black
        name: nbqa-black
        alias: nbqa-black
        entry: nbqa black
        language: system
        types: [jupyter]
        require_serial: true
        files: '.*\.ipynb$'
        always_run: false
        stages:
          - commit
        args:
          - "--nbqa-config=pyproject.toml"
