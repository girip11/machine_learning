default_language_version:
  # force all unspecified python hooks to run python3
  python: python3
repos:
  - repo: "https://github.com/nbQA-dev/nbQA"
    rev: 0.2.2
    hooks:
      - id: nbqa
        args:
          - black
        name: nbqa-black
        alias: nbqa-black
        additional_dependencies:
          - black
      - id: nbqa
        args:
          - flake8
        name: nbqa-flake8
        alias: nbqa-flake8
        additional_dependencies:
          - flake8
      - id: nbqa
        args:
          - isort
        name: nbqa-isort
        alias: nbqa-isort
        additional_dependencies:
          - isort
