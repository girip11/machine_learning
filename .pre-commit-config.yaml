# Reference: https://nbqa.readthedocs.io/en/latest/pre-commit.html
default_language_version:
  # force all unspecified python hooks to run python3
  python: python3
repos:
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.3.1
    hooks:
      - id: nbqa-black
        args:
          - "--check"
          - "--target-version=py38"
          - "--line-length=100"
      - id: nbqa-isort
        args:
          - "--check"
      - id: nbqa-flake8
      - id: nbqa-mypy
